  href:
    type: url
  callToAction:
    type: object
    options:
      preview:
        icon: ads_click
  callToAction2:
    type: object
    options:
      preview:
        icon: ads_click
  textarea:
    type: object
    options:
      preview:
        icon: text_fields
  disclaimer:
    type: object
    options:
      preview:
        icon: policy
  button:
    type: object
    options:
      preview:
        icon: smart_button
  isDark:
    type: switch
  isReversed:
    type: switch
  isBeforeContent:
    type: switch
  isAfterContent:
    type: switch
  hasRibbon:
    type: switch
  draft:
    type: switch
  publishDate:
    type: datetime
    instance_value: now
  updateDate:
    type: datetime
  layout:
    type: select
    options:
      values:
        - page
        - landing
    hidden: true
  variant:
    type: select
    options:
      values:
        - primary
        - secondary
        - tertiary
        - link
  _schema:
    type: select
    options:
      values:
        - page_builder
        - default
    hidden: true
  content_blocks:
    type: array
    options:
      structures:
        values_from_glob:
          - /src/components/widgets/*.cloudcannon.structure-value.yml
  metadata:
    type: object
    options:
      preview:
        icon: manage_search
  columns:
    type: number
  rows:
    type: number
  count:
    type: number
  price:
    type: text
  period:
    type: text
  target:
    type: select
    options:
      values:
        - _blank
        - _self
  type:
    type: text

_structures:
  actions:
    values:
      - label: Action
        icon: ads_click
        preview:
          text:
            - key: text
            - Action
          icon:
            - ads_click
        value:
          text:
          href:
          variant: primary
          icon:
          target:
  items:
    values:
      - label: Item
        icon: list
        preview:
          text:
            - key: title
            - Item
          icon:
            - key: icon
            - list
        value:
          title:
          description:
          icon:
  stats:
    values:
      - label: Stat
        icon: bar_chart
        preview:
          text:
            - key: title
            - Stat
          icon:
            - key: icon
            - bar_chart
        value:
          amount:
          title:
          icon:
  prices:
    values:
      - label: Price
        icon: payments
        preview:
          text:
            - key: title
            - Price
          icon:
            - payments
        value:
          title:
          subtitle:
          price:
          period:
          items: []
          callToAction:
            text:
            href:
          hasRibbon: false
          ribbonTitle:
        _inputs:
          hasRibbon:
            type: switch
  testimonials:
    values:
      - label: Testimonial
        icon: format_quote
        preview:
          text:
            - key: name
            - Testimonial
          icon:
            - format_quote
          image:
            - key: image.src
        value:
          testimonial:
          name:
          job:
          image:
            src:
            alt:
  inputs:
    values:
      - label: Input
        icon: input
        preview:
          text:
            - key: label
            - Input
          icon:
            - input
        value:
          type: text
          name:
          label:
          placeholder:
  images:
    values:
      - label: Image
        icon: image
        preview:
          image:
            - key: src
          icon:
            - image
        value:
          src:
          alt:
  header_links:
    values:
      - label: Link
        icon: link
        preview:
          text:
            - key: text
            - Link
          icon:
            - link
        value:
          text:
          href:
      - label: Dropdown
        icon: arrow_drop_down
        preview:
          text:
            - key: text
            - Dropdown
          icon:
            - arrow_drop_down
        value:
          text:
          links: []
  footer_link_groups:
    values:
      - label: Link Group
        icon: folder
        preview:
          text:
            - key: title
            - Link Group
          icon:
            - folder
        value:
          title:
          links: []
  social_links:
    values:
      - label: Social Link
        icon: share
        preview:
          text:
            - key: ariaLabel
            - Social Link
          icon:
            - share
        value:
          ariaLabel:
          icon:
          href:

_snippets:
  logo:
    template: mdx_component
    inline: false
    preview:
      text: Logo
      icon: image
    definitions:
      component_name: Logo
      named_args: []
  youtube:
    template: mdx_component
    inline: false
    preview:
      text: YouTube Video
      icon: play_circle
    definitions:
      component_name: YouTube
      named_args:
        - editor_key: id
          type: string
  tweet:
    template: mdx_component
    inline: false
    preview:
      text: Tweet
      icon: chat
    definitions:
      component_name: Tweet
      named_args:
        - editor_key: id
          type: string
  vimeo:
    template: mdx_component
    inline: false
    preview:
      text: Vimeo Video
      icon: videocam
    definitions:
      component_name: Vimeo
      named_args:
        - editor_key: id
          type: string

file_config:
  - glob: src/config.yaml
    _inputs:
      site:
        type: object
        options:
          preview:
            icon: language
      metadata:
        type: object
        options:
          preview:
            icon: manage_search
      i18n:
        type: object
        options:
          preview:
            icon: translate
      apps:
        type: object
        options:
          preview:
            icon: apps
      analytics:
        type: object
        options:
          preview:
            icon: analytics
      ui:
        type: object
        options:
          preview:
            icon: palette
