source: templates/astrowind/migrated/

paths:
  static: public
  uploads: public/images

markdown:
  engine: commonmark
  options:
    gfm: true
    table: true

_editables:
  content:
    blockquote: true
    bold: true
    bulletedlist: true
    format: p h1 h2 h3 h4 h5 h6
    image: true
    italic: true
    link: true
    numberedlist: true
    removeformat: true
    snippet: true
    table: true

collections_config:
  pages:
    path: src/content/pages
    glob:
      - "!homes/**"
      - "!landing/**"
    url: "/[slug]/"
    icon: wysiwyg
    _enabled_editors:
      - visual
      - data
    schemas:
      page_builder:
        path: templates/astrowind/migrated/.cloudcannon/schemas/page-builder.md
        name: Page Builder
      default:
        path: templates/astrowind/migrated/.cloudcannon/schemas/page.md
        name: Page
    add_options:
      - name: Page
        schema: default
        icon: wysiwyg
      - name: Page Builder
        schema: page_builder
        icon: dashboard
  homes:
    path: src/content/pages/homes
    url: "/homes/[slug]/"
    icon: wysiwyg
    _enabled_editors:
      - visual
      - data
    schemas:
      page_builder:
        path: templates/astrowind/migrated/.cloudcannon/schemas/page-builder.md
        name: Page Builder
      default:
        path: templates/astrowind/migrated/.cloudcannon/schemas/page.md
        name: Page
    add_options:
      - name: Page
        schema: default
        icon: wysiwyg
      - name: Page Builder
        schema: page_builder
        icon: dashboard
  landing:
    path: src/content/pages/landing
    url: "/landing/[slug]/"
    icon: wysiwyg
    _enabled_editors:
      - visual
      - data
    schemas:
      page_builder:
        path: templates/astrowind/migrated/.cloudcannon/schemas/page-builder.md
        name: Page Builder
      default:
        path: templates/astrowind/migrated/.cloudcannon/schemas/page.md
        name: Page
    add_options:
      - name: Page
        schema: default
        icon: wysiwyg
      - name: Page Builder
        schema: page_builder
        icon: dashboard
  post:
    path: src/data/post
    url: "/[slug]/"
    icon: event_available
    _enabled_editors:
      - content
      - data

data_config:
  navigation:
    path: src/data/navigation.json
  config:
    path: src/config.yaml

collection_groups:
  - heading: Pages
    collections:
      - pages
      - homes
      - landing
  - heading: Blogging
    collections:
      - post
  - heading: Site Settings
    collections:
      - data

_inputs:
  title:
    type: text
  subtitle:
    type: textarea
  tagline:
    type: text
  description:
    type: textarea
  content:
    type: html
    options:
      allow_custom_markup: true
  image:
    type: image
  src:
    type: image
  alt:
    type: text
  icon:
    type: select
    comment: "Pick an icon or type a custom [Iconify](https://icon-sets.iconify.design/) name"
    options:
      allow_create: true
      value_key: id
      preview:
        text:
          - key: name
      values:
