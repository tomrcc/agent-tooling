source: templates/astro-cactus/migrated/

paths:
  static: public
  uploads: public/images

timezone: Pacific/Auckland

markdown:
  engine: commonmark
  options:
    gfm: true
    table: true
    escape_snippets_in_code_blocks: true

_editables:
  content:
    blockquote: true
    bold: true
    bulletedlist: true
    code: true
    format: p h1 h2 h3 h4 h5 h6
    horizontalrule: true
    image: true
    italic: true
    link: true
    numberedlist: false
    snippet: true
    table: true
    styles: /css/editor-styles.css
  block:
    blockquote: true
    bold: true
    bulletedlist: true
    code: true
    format: p h1 h2 h3 h4 h5 h6
    horizontalrule: true
    image: true
    italic: true
    link: true
    numberedlist: true
    snippet: true
    table: true
    styles: /css/editor-styles.css

_snippets:
  admonition:
    snippet: ':::[[type]][[title]]\n[[content]]:::'
    inline: false
    preview:
      text:
        - key: type
        - Admonition
      icon: info
    params:
      type:
        parser: argument
        options:
          model:
            editor_key: type
          format:
            string_boundary: ['']
      title:
        parser: content
        options:
          editor_key: title
          allow_nested: false
          raw: true
          optional: true
          forbidden_tokens: ['\n']
          style:
            output: inline
            inline:
              leading: '['
              trailing: ']'
      content:
        parser: content
        options:
          editor_key: content
          style:
            output: block
            block:
              leading: '\n'
              trailing: '\n'
    _inputs:
      type:
        type: select
        options:
          values:
            - note
            - tip
            - important
            - warning
            - caution
      title:
        type: text
        label: Title (optional)
      content:
        type: markdown

data_config:
  tags:
    path: src/data/tags.json

collection_groups:
  - heading: Pages
    collections:
      - pages
  - heading: Blogging
    collections:
      - post
  - heading: Notes
    collections:
      - note
  - heading: Tags
    collections:
      - tag
  - heading: Data
    collections:
      - data

collections_config:
  pages:
    path: src/pages
    icon: wysiwyg
    url: "/[slug]/"
    glob:
      - index.astro
      - about.astro
    _enabled_editors:
      - visual
    disable_add: true

  post:
    path: src/content/post
    icon: event_available
    url: "/posts/[full_slug]/"
    glob:
      - "**/*.md"
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: templates/astro-cactus/migrated/.cloudcannon/schemas/post.md
        name: Blog Post
    add_options:
      - name: Blog Post
        schema: default
        icon: post_add
        editor: content

  note:
    path: src/content/note
    icon: notes
    url: "/notes/[slug]/"
    glob:
      - "**/*.md"
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: templates/astro-cactus/migrated/.cloudcannon/schemas/note.md
        name: Note
    add_options:
      - name: Note
        schema: default
        icon: edit_note
        editor: content

  tag:
    path: src/content/tag
    icon: tag
    url: "/tags/[slug]/"
    glob:
      - "**/*.md"
    _enabled_editors:
      - content
      - data
    schemas:
      default:
        path: templates/astro-cactus/migrated/.cloudcannon/schemas/tag.md
        name: Tag
    add_options:
      - name: Tag
        schema: default
        icon: new_label
        editor: content

  data:
    path: src/data
    icon: database
    glob:
      - "**/*.json"
    _enabled_editors:
      - data
    disable_add: true

_inputs:
  title:
    type: text
    comment: Max 60 characters
  description:
    type: textarea
  publishDate:
    type: datetime
  updatedDate:
    type: datetime
  draft:
    type: switch
  pinned:
    type: switch
    comment: Pinned posts appear at the top of the homepage
  tags:
    type: multiselect
    options:
      values: data.tags
      allow_create: true
  coverImage:
    type: object
    options:
      preview:
        icon: image
  ogImage:
    type: image
    comment: Custom Open Graph image. Auto-generated if left empty.
