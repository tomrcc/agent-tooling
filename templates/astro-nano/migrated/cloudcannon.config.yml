# yaml-language-server: $schema=https://raw.githubusercontent.com/CloudCannon/configuration-types/main/cloudcannon-config.schema.json
paths:
  static: public
  uploads: public

timezone: Pacific/Auckland

markdown:
  engine: commonmark
  options:
    gfm: true
    table: true

_editables:
  content:
    blockquote: true
    bold: true
    bulletedlist: true
    format: p h1 h2 h3 h4 h5 h6
    image: true
    italic: true
    link: true
    numberedlist: true
    removeformat: true
    snippet: true
    table: true

collection_groups:
  - heading: Pages
    collections:
      - pages
  - heading: Blogging
    collections:
      - blog
  - heading: Content
    collections:
      - projects
      - work

collections_config:
  pages:
    path: src/pages
    icon: wysiwyg
    url: "/[slug]/"
    glob:
      - "index.astro"
      - "work/index.astro"
    _enabled_editors:
      - visual
    disable_add: true

  blog:
    path: src/content/blog
    url: "/blog/[slug]/"
    icon: event_available
    glob:
      - "**/*.{md,mdx}"
    _enabled_editors:
      - visual
      - content
      - data
    add_options:
      - name: Blog Post
        schema: default
        icon: event_available
        editor: content
    schemas:
      default:
        path: .cloudcannon/schemas/post.md
        name: Blog Post

  projects:
    path: src/content/projects
    url: "/projects/[slug]/"
    icon: rocket_launch
    glob:
      - "**/*.md"
    _enabled_editors:
      - visual
      - content
      - data
    add_options:
      - name: Project
        schema: default
        icon: rocket_launch
        editor: content
    schemas:
      default:
        path: .cloudcannon/schemas/project.md
        name: Project

  work:
    path: src/content/work
    icon: work
    glob:
      - "*.md"
    _enabled_editors:
      - visual
      - content
      - data
    add_options:
      - name: Work Entry
        schema: default
        icon: work
        editor: content
    schemas:
      default:
        path: .cloudcannon/schemas/work.md
        name: Work Entry

_inputs:
  title:
    type: text
  description:
    type: textarea
  date:
    type: datetime
    instance_value: now
  draft:
    type: switch
    comment: Draft items are hidden from the site.
  company:
    type: text
  role:
    type: text
  dateStart:
    type: datetime
  dateEnd:
    type: text
    comment: A date (e.g. "11/27/2022") or "Current" for active positions.
  demoURL:
    type: url
    comment: Link to live demo
  repoURL:
    type: url
    comment: Link to source repository

_snippets:
  formatted_date:
    snippet: "<FormattedDate date={new Date()} />"
    inline: true
    preview:
      text: Current Date
      icon: calendar_today
    params: {}
  mdx_button:
    snippet: "<MdxButton />"
    inline: false
    preview:
      text: Button
      icon: smart_button
    params: {}
