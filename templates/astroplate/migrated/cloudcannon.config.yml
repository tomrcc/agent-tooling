source: templates/astroplate/migrated
paths:
  static: public
  uploads: public/images

timezone: Pacific/Auckland

markdown:
  engine: commonmark
  options:
    table: true

_editables:
  content:
    blockquote: true
    bold: true
    bulletedlist: true
    format: p h1 h2 h3 h4 h5 h6
    image: true
    italic: true
    link: true
    numberedlist: true
    removeformat: true
    snippet: true
    table: true

data_config:
  announcement:
    path: src/data/announcement.json
  call-to-action:
    path: src/data/call-to-action.json
  testimonial:
    path: src/data/testimonial.json

collection_groups:
  - heading: Pages
    collections:
      - pages
  - heading: Data
    collections:
      - data
  - heading: Blogging
    collections:
      - blog
      - authors
  - heading: Site Settings
    collections:
      - config

collections_config:
  pages:
    path: src/content/pages
    url: "/[slug]/"
    icon: wysiwyg
    glob:
      - "**/*.{md,mdx}"
    _enabled_editors:
      - visual
      - data
    schemas:
      default:
        path: templates/astroplate/migrated/.cloudcannon/schemas/page.md
        name: Page
      homepage:
        path: templates/astroplate/migrated/.cloudcannon/schemas/homepage.md
        name: Homepage
      contact:
        path: templates/astroplate/migrated/.cloudcannon/schemas/contact.md
        name: Contact
    _inputs:
      features:
        type: array
        options:
          structures: _structures.features
  blog:
    path: src/content/blog
    url: "/blog/[slug]/"
    icon: event_available
    glob:
      - "**/*.{md,mdx}"
    _enabled_editors:
      - visual
      - data
    schemas:
      default:
        path: templates/astroplate/migrated/.cloudcannon/schemas/post.md
        name: Blog Post
      blog_index:
        path: templates/astroplate/migrated/.cloudcannon/schemas/blog-index.md
        name: Blog Index
    _inputs:
      author:
        type: select
        options:
          values: collections.authors
          value_key: title
      categories:
        type: multiselect
        options:
          allow_create: true
      tags:
        type: multiselect
        options:
          allow_create: true
  authors:
    path: src/content/authors
    url: "/authors/[slug]/"
    icon: person
    glob:
      - "**/*.{md,mdx}"
    _enabled_editors:
      - visual
      - data
    schemas:
      default:
        path: templates/astroplate/migrated/.cloudcannon/schemas/author.md
        name: Author
      authors_index:
        path: templates/astroplate/migrated/.cloudcannon/schemas/authors-index.md
        name: Authors Index
    _inputs:
      icon:
        type: text
        comment: React Icons component name (e.g. FaGithub)
      social:
        type: array
        options:
          structures: _structures.social
  data:
    path: src/data
    icon: inventory_2
    glob:
      - "**/*.json"
    _enabled_editors:
      - data
    _inputs:
      testimonials:
        type: array
        options:
          structures: _structures.testimonials
      text:
        type: text
      link_text:
        type: text
      link_url:
        type: url
      expire_days:
        type: number
        comment: Days before the announcement auto-dismisses
  config:
    path: src/config
    icon: settings
    glob:
      - "**/*.json"
    _enabled_editors:
      - data

_inputs:
  title:
    type: text
  meta_title:
    type: text
    comment: Override the page title for SEO. Leave blank to use the title field.
  description:
    type: textarea
  image:
    type: image
  date:
    type: datetime
    instance_value: now
  draft:
    type: switch
    comment: Draft posts are not included in the build output.
  enable:
    type: switch
  content:
    type: textarea
  link:
    type: url
  label:
    type: text
  name:
    type: text
  designation:
    type: text
  avatar:
    type: image
  button:
    type: object
    options:
      preview:
        icon: smart_button

_structures:
  social:
    values:
      - label: Social Link
        picker_preview:
          text: Social Link
          icon: share
        preview:
          text:
            - key: name
          subtext:
            - key: link
          icon:
            - share
        _inputs:
          name:
            type: text
          icon:
            type: text
            comment: React Icons component name (e.g. FaGithub, FaTwitter, FaLinkedin)
          link:
            type: url
        value:
          name:
          icon:
          link:
  features:
    values:
      - label: Feature
        picker_preview:
          text: Feature
          icon: star
        preview:
          text:
            - key: title
          image:
            - key: image
        _inputs:
          title:
            type: text
          image:
            type: image
          content:
            type: textarea
          bulletpoints:
            type: array
        value:
          title:
          image:
          content:
          bulletpoints: []
          button:
            enable: true
            label:
            link:
  testimonials:
    values:
      - label: Testimonial
        picker_preview:
          text: Testimonial
          icon: format_quote
        preview:
          text:
            - key: name
          subtext:
            - key: designation
          icon:
            - format_quote
          image:
            - key: avatar
        _inputs:
          avatar:
            type: image
          content:
            type: textarea
          name:
            type: text
          designation:
            type: text
        value:
          name:
          avatar:
          designation:
          content:
  nav_items:
    values:
      - label: Link
        picker_preview:
          text: Link
          icon: link
        preview:
          text:
            - key: name
          subtext:
            - key: url
        value:
          name:
          url:
      - label: Dropdown
        picker_preview:
          text: Dropdown
          icon: arrow_drop_down
        preview:
          text:
            - key: name
        value:
          name:
          url:
          hasChildren: true
          children: []
  nav_items_children:
    values:
      - label: Link
        picker_preview:
          text: Link
          icon: link
        preview:
          text:
            - key: name
          subtext:
            - key: url
        value:
          name:
          url:

_snippets:
  button:
    template: mdx_component
    inline: false
    preview:
      text: Button
      icon: smart_button
    definitions:
      component_name: Button
      named_args:
        - editor_key: label
          type: string
        - editor_key: link
          type: string
        - editor_key: style
          type: string
          optional: true
        - editor_key: rel
          type: string
          optional: true
          remove_empty: true
    _inputs:
      style:
        type: select
        options:
          values:
            - solid
            - outline
      link:
        type: url

  video:
    template: mdx_component
    inline: false
    preview:
      text: Video
      icon: videocam
    definitions:
      component_name: Video
      named_args:
        - editor_key: src
          type: string
        - editor_key: width
          type: string
          optional: true
        - editor_key: height
          type: string
          optional: true
          remove_empty: true
        - editor_key: title
          type: string
          optional: true
          remove_empty: true
    _inputs:
      src:
        type: url
        comment: URL or path to video file

  notice:
    template: mdx_paired_component
    inline: false
    preview:
      text: Notice
      icon: info
    definitions:
      component_name: Notice
      content_key: inner_content
      named_args:
        - editor_key: type
          type: string
    _inputs:
      type:
        type: select
        options:
          values:
            - note
            - tip
            - info
            - warning

  youtube:
    snippet: '<Youtube client:load [[named_args]] />'
    inline: false
    preview:
      text: YouTube Video
      icon: play_circle
    params:
      named_args:
        parser: key_values
        options:
          models:
            - editor_key: id
              type: string
            - editor_key: title
              type: string
          format:
            root_value_delimiter: '='
            string_boundary:
              - '"'
    _inputs:
      id:
        type: text
        comment: YouTube video ID
      title:
        type: text

  accordion:
    snippet: '<Accordion client:load [[named_args]]>[[inner_content]]</Accordion>'
    inline: false
    preview:
      text: Accordion
      icon: expand_more
    params:
      named_args:
        parser: key_values
        options:
          models:
            - editor_key: title
              type: string
          format:
            root_value_delimiter: '='
            string_boundary:
              - '"'
      inner_content:
        parser: content
        options:
          editor_key: inner_content
    _inputs:
      title:
        type: text

  tabs:
    snippet: '<Tabs client:load>[[repeating_tabs]]</Tabs>'
    inline: false
    preview:
      text: Tabs
      icon: tab
    _inputs:
      tab_items:
        type: array
      tab_items[*]:
        options:
          preview:
            text:
              - key: name
            icon: tab
      tab_items[*].name:
        type: text
      tab_items[*].tab_content:
        type: markdown
    params:
      repeating_tabs:
        parser: repeating
        options:
          snippet: '<Tab [[named_args]]>[[tab_content]]</Tab>'
          editor_key: tab_items
          default_length: 2
          style:
            output: block
            between: "\n\n"
            block:
              leading: "\n\n"
              trailing: "\n\n"
      named_args:
        parser: key_values
        options:
          models:
            - editor_key: name
              type: string
          format:
            root_value_delimiter: '='
            string_boundary:
              - '"'
      tab_content:
        parser: content
        options:
          editor_key: tab_content
          style:
            block:
              leading: "\n\n"
              trailing: "\n\n"

file_config:
  - glob: src/config/menu.json
    _inputs:
      main:
        type: array
        options:
          structures: _structures.nav_items
      footer:
        type: array
        options:
          structures: _structures.nav_items
      children:
        type: array
        options:
          structures: _structures.nav_items_children
  - glob: src/config/social.json
    _inputs:
      main:
        type: array
        options:
          structures: _structures.social
  - glob: src/config/config.json
    _inputs:
      site:
        type: object
        options:
          preview:
            icon: language
      settings:
        type: object
        options:
          preview:
            icon: tune
      params:
        type: object
        options:
          preview:
            icon: data_object
      navigation_button:
        type: object
        options:
          preview:
            icon: smart_button
      google_tag_manager:
        type: object
        options:
          preview:
            icon: analytics
      disqus:
        type: object
        options:
          preview:
            icon: forum
      metadata:
        type: object
        options:
          preview:
            icon: manage_search
      base_url:
        type: url
      base_path:
        type: text
      trailing_slash:
        type: switch
      favicon:
        type: image
      logo:
        type: image
      logo_darkmode:
        type: image
      logo_width:
        type: text
        comment: Width in pixels
      logo_height:
        type: text
        comment: Height in pixels
      logo_text:
        type: text
      search:
        type: switch
      sticky_header:
        type: switch
      theme_switcher:
        type: switch
      default_theme:
        type: select
        options:
          values:
            - system
            - light
            - dark
      pagination:
        type: number
      summary_length:
        type: number
      blog_folder:
        type: text
      contact_form_action:
        type: text
        comment: Form action URL or endpoint
      copyright:
        type: text
        comment: Supports inline markdown links
      gtm_id:
        type: text
      shortname:
        type: text
      meta_author:
        type: text
      meta_image:
        type: image
      meta_description:
        type: textarea
  - glob: src/config/theme.json
    _inputs:
      theme_color.primary:
        type: color
      body:
        type: color
      border:
        type: color
      light:
        type: color
      dark:
        type: color
      text:
        type: color
      text_dark:
        type: color
      text_light:
        type: color
      font_family.primary:
        type: text
        comment: Google Fonts family and weights
      secondary:
        type: text
        comment: Google Fonts family and weights
      primary_type:
        type: select
        options:
          values:
            - serif
            - sans-serif
            - monospace
      secondary_type:
        type: select
        options:
          values:
            - serif
            - sans-serif
            - monospace
      base:
        type: number
        comment: Base font size in pixels
      scale:
        type: number
        comment: Type scale ratio
