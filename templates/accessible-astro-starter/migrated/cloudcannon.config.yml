# yaml-language-server: $schema=https://raw.githubusercontent.com/CloudCannon/configuration-types/main/cloudcannon-config.schema.json

paths:
  static: public
  uploads: public/images

markdown:
  engine: commonmark
  options:
    gfm: true

_editables:
  content:
    blockquote: true
    bold: true
    bulletedlist: true
    code: true
    format: p h1 h2 h3 h4 h5 h6
    horizontalrule: true
    image: true
    italic: true
    link: true
    numberedlist: true
    removeformat: true
    snippet: true

data_config:
  tags:
    path: data/tags.yml
  team:
    path: data/team.yml

collection_groups:
  - heading: Content
    collections:
      - pages
      - blog
      - projects
  - heading: Site
    collections:
      - site_pages
  - heading: Data
    collections:
      - data

collections_config:
  pages:
    path: src/content/pages
    url: "/[slug]/"
    icon: wysiwyg
    _enabled_editors:
      - visual
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/page.md
        name: Page
      homepage:
        path: .cloudcannon/schemas/homepage.md
        name: Homepage
    add_options:
      - name: Page
        schema: default
        icon: wysiwyg
        editor: content

  blog:
    path: src/content/blog
    url: "/blog/[slug]/"
    icon: rss_feed
    _enabled_editors:
      - content
      - visual
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/blog-post.md
        name: Blog Post
    add_options:
      - name: Blog Post
        schema: default
        icon: post_add
        editor: content

  projects:
    path: src/content/projects
    url: "/portfolio/[slug]/"
    icon: work
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/project.mdx
        name: Project
    add_options:
      - name: Project
        schema: default
        icon: add_box
        editor: content

  site_pages:
    path: src/pages
    url: "/[slug]/"
    icon: description
    glob:
      - "*.md"
      - "*.mdx"
    _enabled_editors:
      - visual
      - content
    disable_add: true

  data:
    path: data
    icon: database
    disable_url: true
    _enabled_editors:
      - data

_inputs:
  _schema:
    hidden: true
  layout:
    hidden: true
  draft:
    type: checkbox
  date:
    type: datetime
  image:
    type: image
  tags:
    type: multiselect
    comment: >-
      Pick from existing tags or type to create new ones.
      [Manage tags](cloudcannon:collections/data/tags.yml)
    options:
      allow_create: true
      values: data.tags
  icon:
    type: select
    comment: "Pick an icon or type a custom [Iconify](https://icon-sets.iconify.design/lucide/) name"
    options:
      allow_create: true
      value_key: id
      preview:
        text:
          - key: name
      values:
        - name: Accessibility
          id: lucide:accessibility
        - name: Puzzle
          id: lucide:puzzle
        - name: Moon
          id: lucide:moon
        - name: Paintbrush
          id: lucide:paintbrush
        - name: Sparkles
          id: lucide:sparkles
        - name: Code
          id: lucide:code
        - name: Bookmark
          id: lucide:bookmark
        - name: File Text
          id: lucide:file-text
        - name: Blocks
          id: lucide:blocks
        - name: Star
          id: lucide:star
        - name: Rocket
          id: lucide:rocket
        - name: Info
          id: lucide:info
        - name: Headset
          id: lucide:headset
  author:
    type: select
    comment: >-
      Select a team member as author.
      [Manage team](cloudcannon:collections/data/team.yml)
    options:
      values: data.team
      value_key: name
  href:
    type: url
  link_href:
    type: url
  description:
    type: textarea
  content:
    type: markdown
  reverse_image:
    type: checkbox
  show_featured_projects:
    type: checkbox
  show_featured_posts:
    type: checkbox
  hero:
    type: object
    options:
      preview:
        icon: flag
  faq:
    type: object
    options:
      preview:
        icon: help
  community:
    type: object
    options:
      preview:
        icon: groups
  hero.buttons:
    type: array
    options:
      structures: _structures.hero_buttons
  features:
    type: array
    options:
      structures: _structures.features
  content_sections:
    type: array
    options:
      structures: _structures.content_sections
  faq.items:
    type: array
    options:
      structures: _structures.faq_items
  community.members:
    type: multiselect
    comment: >-
      Select team members to feature.
      [Manage team](cloudcannon:collections/data/team.yml)
    options:
      values: data.team
      value_key: name
  counters:
    type: array
    options:
      structures: _structures.counters
  type:
    type: select
    options:
      values:
        - primary
        - secondary
  initials:
    type: text
    comment: Two-letter initials for the avatar

_structures:
  hero_buttons:
    values:
      - label: Button
        icon: smart_button
        value:
          label:
          href:
          type: primary
          icon:
        preview:
          text:
            - key: label
          icon:
            - smart_button

  features:
    values:
      - label: Feature
        icon: star
        value:
          icon:
          title:
          description:
        preview:
          text:
            - key: title
          subtext:
            - key: description
          icon:
            - star

  content_sections:
    values:
      - label: Content Section
        icon: view_sidebar
        value:
          image:
          heading:
          content:
          reverse_image: false
        preview:
          text:
            - key: heading
          image:
            - key: image
          icon:
            - view_sidebar

  faq_items:
    values:
      - label: FAQ Item
        icon: help
        value:
          title:
          content:
        preview:
          text:
            - key: title
          icon:
            - help

  counters:
    values:
      - label: Counter
        icon: counter_1
        value:
          count:
          title:
          subtitle:
        preview:
          text:
            - key: title
          subtext:
            - key: count
          icon:
            - counter_1

_snippets:
  breakout_image:
    template: mdx_component
    inline: false
    preview:
      text: Breakout Image
      icon: panorama
    definitions:
      component_name: BreakoutImage
      named_args:
        - editor_key: src
          type: string
        - editor_key: decorative
          type: boolean
          optional: true
        - editor_key: alt
          type: string
          optional: true
    _inputs:
      src:
        type: image
      alt:
        type: text
        comment: Required if the image is not decorative
      decorative:
        type: checkbox
        comment: Set to true for images that are purely visual

  image_gallery:
    template: mdx_component
    inline: false
    preview:
      text: Image Gallery
      icon: grid_view
    definitions:
      component_name: ImageGallery
      named_args:
        - editor_key: src1
          type: string
        - editor_key: alt1
          type: string
          optional: true
        - editor_key: src2
          type: string
        - editor_key: alt2
          type: string
          optional: true
        - editor_key: src3
          type: string
        - editor_key: alt3
          type: string
          optional: true
        - editor_key: src4
          type: string
        - editor_key: alt4
          type: string
          optional: true
    _inputs:
      src1:
        type: image
        comment: Top-left image
      alt1:
        type: text
        comment: Alt text for top-left image
      src2:
        type: image
        comment: Top-right image
      alt2:
        type: text
        comment: Alt text for top-right image
      src3:
        type: image
        comment: Bottom-left image
      alt3:
        type: text
        comment: Alt text for bottom-left image
      src4:
        type: image
        comment: Bottom-right image
      alt4:
        type: text
        comment: Alt text for bottom-right image

  block_quote:
    template: mdx_paired_component
    inline: false
    preview:
      text: Block Quote
      icon: format_quote
    definitions:
      component_name: BlockQuote
      content_key: inner_content
      named_args:
        - editor_key: author
          type: string
          optional: true
    _inputs:
      author:
        type: text
        comment: Attribution for the quote
      inner_content:
        type: markdown
