source: templates/astrofy/migrated/

paths:
  static: public
  uploads: public

timezone: Pacific/Auckland

markdown:
  engine: commonmark
  options:
    gfm: true

collection_groups:
  - heading: Pages
    collections:
      - pages
  - heading: Blogging
    collections:
      - blog
  - heading: Store
    collections:
      - store

collections_config:
  pages:
    path: src/content/pages
    url: "/[slug]/"
    icon: wysiwyg
    _enabled_editors:
      - visual
      - data
    schemas:
      default:
        path: templates/astrofy/migrated/.cloudcannon/schemas/page.md
        name: Page
      homepage:
        path: templates/astrofy/migrated/.cloudcannon/schemas/homepage.md
        name: Homepage
      card_listing:
        path: templates/astrofy/migrated/.cloudcannon/schemas/card-listing.md
        name: Card Listing
        new_preview_url: /projects/
      cv:
        path: templates/astrofy/migrated/.cloudcannon/schemas/cv.md
        name: CV
    add_options:
      - name: Page
        schema: default
        icon: wysiwyg
        editor: content
      - name: Card Listing
        schema: card_listing
        icon: view_list

  blog:
    path: src/content/blog
    url: "/blog/{permalink}/"
    icon: event_available
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: templates/astrofy/migrated/.cloudcannon/schemas/post.md
        name: Blog Post
    add_options:
      - name: Blog Post
        schema: default
        icon: post_add
        editor: content

  store:
    path: src/content/store
    url: "/store/[slug]/"
    icon: store
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: templates/astrofy/migrated/.cloudcannon/schemas/store-item.md
        name: Store Item
    add_options:
      - name: Store Item
        schema: default
        icon: shopping_bag
        editor: content

_inputs:
  _schema:
    hidden: true
  sidebar_id:
    hidden: true
  title:
    type: text
  description:
    type: textarea
  hero.description:
    type: markdown
  profile:
    type: textarea
  pubDate:
    type: datetime
    comment: Publication date
  updatedDate:
    type: text
    comment: Last updated date
  heroImage:
    type: image
  image:
    type: image
  img:
    type: image
  badge:
    type: text
    comment: Small label shown next to titles (e.g. NEW, FOSS). Requires a save and rebuild to preview
  tags:
    type: multiselect
    comment: Requires a save and rebuild to preview
    options:
      allow_create: true
      values:
        - tokio
        - rust
  draft:
    type: switch
  pricing:
    type: text
  oldPricing:
    type: text
    comment: Original price shown with strikethrough
  checkoutUrl:
    type: url
  custom_link:
    type: url
  custom_link_label:
    type: text
  url:
    type: url
  target:
    type: select
    comment: Requires a save and rebuild to preview
    options:
      values:
        - _blank
        - _self
  blog_heading:
    type: text
  blog_posts_count:
    type: number
    comment: Number of recent blog posts shown on the homepage. Requires a save and rebuild to preview
  variant:
    type: select
    comment: Requires a save and rebuild to preview
    options:
      values:
        - primary
        - outline
  items:
    type: array
    options:
      structures: _structures.card_items
  sections:
    type: array
    options:
      structures: _structures.card_sections
  education:
    type: array
    options:
      structures: _structures.timeline_entries
  experience:
    type: array
    options:
      structures: _structures.timeline_entries
  certifications:
    type: array
    options:
      structures: _structures.certification_entries
  skills:
    type: array
  hero:
    type: object
    options:
      preview:
        icon: person
  buttons:
    type: array
    options:
      structures: _structures.hero_buttons

_structures:
  card_items:
    values:
      - label: Card
        icon: view_agenda
        picker_preview:
          text: Card
          icon: view_agenda
        preview:
          text:
            - key: title
            - Card
          icon:
            - view_agenda
          image:
            - key: img
        value:
          title:
          img:
          desc:
          url:
          badge:
          tags: []
          target: _blank
  card_sections:
    values:
      - label: Section
        icon: view_list
        picker_preview:
          text: Section
          icon: view_list
        preview:
          text:
            - key: heading
            - Section
          icon:
            - view_list
        value:
          heading:
          items: []
  timeline_entries:
    values:
      - label: Entry
        icon: timeline
        picker_preview:
          text: Entry
          icon: timeline
        preview:
          text:
            - key: title
            - Entry
          icon:
            - timeline
        value:
          title:
          subtitle:
          description:
  certification_entries:
    values:
      - label: Certification
        icon: verified
        picker_preview:
          text: Certification
          icon: verified
        preview:
          text:
            - key: text
            - Certification
          icon:
            - verified
        value:
          text:
          url:
  hero_buttons:
    values:
      - label: Button
        icon: ads_click
        picker_preview:
          text: Button
          icon: ads_click
        preview:
          text:
            - key: text
            - Button
          icon:
            - ads_click
        value:
          text:
          url:
          variant: primary
          target: _blank
