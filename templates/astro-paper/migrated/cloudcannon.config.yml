# yaml-language-server: $schema=https://raw.githubusercontent.com/CloudCannon/configuration-types/main/cloudcannon-config.schema.json

paths:
  static: public
  uploads: public

markdown:
  engine: commonmark
  options:
    gfm: true
    table: true

_editables:
  content:
    blockquote: true
    bold: true
    bulletedlist: true
    format: p h1 h2 h3 h4 h5 h6
    image: true
    italic: true
    link: true
    numberedlist: true
    removeformat: true
    table: true
    code: true
    horizontalrule: true
    snippet: true

collection_groups:
  - heading: Content
    collections:
      - blog
  - heading: Pages
    collections:
      - pages

collections_config:
  blog:
    path: src/data/blog
    icon: rss_feed
    url: "/posts/{slug}/"
    glob:
      - "**/*.md"
    _enabled_editors:
      - visual
      - content
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/post.md
        name: Blog Post
    add_options:
      - name: Blog Post
        schema: default
        icon: post_add
        editor: content
  pages:
    path: src/pages
    icon: wysiwyg
    url: "/[slug]/"
    glob:
      - "*.md"
      - "index.astro"
    _enabled_editors:
      - visual
    disable_add: true

_inputs:
  title:
    type: text
  description:
    type: textarea
  author:
    type: text
  pubDatetime:
    type: datetime
    comment: Publication date
  modDatetime:
    type: datetime
    comment: Last modified date
  tags:
    type: multiselect
    options:
      allow_create: true
  featured:
    type: switch
  draft:
    type: switch
  ogImage:
    type: image
    comment: Custom Open Graph image for social sharing
  canonicalURL:
    hidden: true
  hideEditPost:
    hidden: true
  timezone:
    hidden: true
  slug:
    type: text
    comment: URL slug for this post. Controls the /posts/{slug}/ URL path.
  layout:
    hidden: true

_snippets:
  figure:
    snippet: |-
      <figure>
      <img [[img_attrs]] />
      <figcaption>
      [[caption]]
      </figcaption>
      </figure>
    inline: false
    view: gallery
    preview:
      gallery:
        image:
          - key: src
        fit: contain
      text:
        - key: alt
        - Figure
      icon: image
    picker_preview:
      gallery:
        image: false
        icon: image
      text: Figure
    params:
      img_attrs:
        parser: key_values
        options:
          models:
            - editor_key: src
              type: string
            - editor_key: alt
              type: string
          format:
            root_value_delimiter: "="
            string_boundary:
              - '"'
      caption:
        parser: content
        options:
          editor_key: caption
    _inputs:
      src:
        type: image
      alt:
        type: text
        comment: Accessible description of the image
      caption:
        type: html
        comment: Caption displayed below the image
  video_controls:
    snippet: |-
      <video autoplay muted="muted" controls plays-inline="true" class="border border-skin-line">
      <source [[source_attrs]] type="video/mp4">
      </video>
    inline: false
    preview:
      text: Video
      icon: videocam
    params:
      source_attrs:
        parser: key_values
        options:
          models:
            - editor_key: src
              type: string
          format:
            root_value_delimiter: "="
            string_boundary:
              - '"'
    _inputs:
      src:
        type: url
        comment: URL to the video file
  video_loop:
    snippet: |-
      <video autoplay loop="loop" muted="muted" plays-inline="true">
      <source [[source_attrs]] type="video/mp4">
      </video>
    inline: false
    preview:
      text: Looping Video
      icon: loop
    params:
      source_attrs:
        parser: key_values
        options:
          models:
            - editor_key: src
              type: string
          format:
            root_value_delimiter: "="
            string_boundary:
              - '"'
    _inputs:
      src:
        type: url
        comment: URL to the video file
