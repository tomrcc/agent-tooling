# yaml-language-server: $schema=https://raw.githubusercontent.com/CloudCannon/configuration-types/main/cloudcannon-config.schema.json

paths:
  static: public
  uploads: public/images

timezone: Pacific/Auckland

markdown:
  engine: commonmark
  options:
    gfm: true
    table: true

_editables:
  content:
    blockquote: true
    bold: true
    bulletedlist: true
    format: p h1 h2 h3 h4 h5 h6
    image: true
    italic: true
    link: true
    numberedlist: true
    removeformat: true
    snippet: true
    table: true

collections_config:
  pages:
    path: src/content/pages
    url: "/[slug]/"
    icon: wysiwyg
    _enabled_editors:
      - visual
      - data
    schemas:
      homepage:
        path: .cloudcannon/schemas/homepage.md
        name: Homepage
      about:
        path: .cloudcannon/schemas/about.md
        name: About Page
      pricing:
        path: .cloudcannon/schemas/pricing.md
        name: Pricing Page
      contact:
        path: .cloudcannon/schemas/contact.md
        name: Contact Page
    add_options: []
  blog:
    path: src/content/blog
    url: "/blog/[slug]/"
    icon: event_available
    _enabled_editors:
      - content
      - visual
      - data
    schemas:
      default:
        path: .cloudcannon/schemas/post.md
        name: Blog Post
    add_options:
      - name: Blog Post
        schema: default
        icon: event_available
  team:
    path: src/content/team
    icon: people
    schemas:
      default:
        path: .cloudcannon/schemas/team-member.md
        name: Team Member
    add_options:
      - name: Team Member
        schema: default
        icon: person

collection_groups:
  - heading: Pages
    collections:
      - pages
  - heading: Blogging
    collections:
      - blog
      - team

_inputs:
  title:
    type: text
  description:
    type: textarea
  snippet:
    type: textarea
  heading:
    type: text
  body_text:
    type: textarea
  draft:
    type: switch
  image:
    type: object
    options:
      preview:
        icon: image
  image.src:
    type: image
  image.alt:
    type: text
  avatar:
    type: object
    options:
      preview:
        icon: account_circle
  avatar.src:
    type: image
  avatar.alt:
    type: text
  publishDate:
    type: datetime
  author:
    type: text
  category:
    type: text
  tags:
    type: multiselect
    options:
      allow_create: true
  address:
    type: text
  email:
    type: email
  phone:
    type: text
  popular:
    type: switch
  price:
    type: text
  name:
    type: text
  link:
    type: url
  label:
    type: text
  text:
    type: text
  style:
    type: text
    hidden: true
  icon:
    type: text
    hidden: true
  banner.image:
    type: image
  banner.image_alt:
    type: text
  _schema:
    type: text
    hidden: true

_structures:
  buttons:
    values:
      - label: Button
        icon: smart_button
        value:
          label:
          link:
          style: primary
          icon:
  features_items:
    values:
      - label: Feature
        icon: star
        value:
          title:
          description:
          icon:
  plans:
    values:
      - label: Plan
        icon: payments
        value:
          name:
          price:
          popular: false
          features: []
          button:
            text:
            link:

file_config:
  - glob: src/content/pages/index.md
    _inputs:
      banner:
        type: object
        options:
          preview:
            icon: view_carousel
      features:
        type: object
        options:
          preview:
            icon: grid_view
      features.items:
        type: array
        options:
          structures: _structures.features_items
      cta:
        type: object
        options:
          preview:
            icon: campaign
      cta.button:
        type: object
        options:
          preview:
            icon: smart_button
      buttons:
        type: array
        options:
          structures: _structures.buttons
  - glob: src/content/pages/pricing.md
    _inputs:
      plans:
        type: array
        options:
          structures: _structures.plans
      plans[*].features:
        type: array
      plans[*].button:
        type: object
        options:
          preview:
            icon: smart_button

_snippets:
  button:
    template: mdx_paired_component
    inline: true
    preview:
      text: Button
      icon: smart_button
    definitions:
      component_name: Button
      content_key: inner_text
      named_args: []
    _inputs:
      inner_text:
        type: text
        label: Button text
